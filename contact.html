   <!-- Javascript files-->
   <script>

      const swipeBtn = document.getElementById("swipeUp");

      window.addEventListener("scroll", function () {

         if (window.scrollY > 400) {
            swipeBtn.classList.add("show");
         } else {
            swipeBtn.classList.remove("show");
         }

      });

      swipeBtn.addEventListener("click", function () {

         window.scrollTo({
            top: 0,
            behavior: "smooth"
         });

      });

   </script>

   <script>
      document.getElementById("minduraForm").addEventListener("submit", function (e) {
         e.preventDefault();

         let formData = {
            Name: this.Name.value,
            Phone: this.Phone.value,
            Email: this.Email.value,
            Details: this.Details.value,
            Message: this.Message.value
         };

         fetch("https://script.google.com/macros/s/AKfycbxl2-H5coAsfQ_Aitj19U2QBsZFsinHfoQy0B6HAa_2N2yWKaFRiKmpMGBGm7TrkzEJ/exec", {
            method: "POST",
            body: JSON.stringify(formData)
         })
            .then(() => alert("Form Submitted Successfully"));
      });
