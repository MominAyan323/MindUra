        .hero {

        #t_rating {

            color: #ffb400;
        }


        /* ===============================
   DETAILS CARD
================================*/

        .card-box {
            background: #ffffff;
            padding: 40px;
            margin-top: 50px;
            border-radius: 14px;
            box-shadow: 0px 8px 30px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .card-box h4 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #111;
            position: relative;
        }

        /* underline effect */
        .card-box h4::after {
            content: "";
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            position: absolute;
            left: 0;
            bottom: -8px;
        }

        .card-box p {
            font-size: 17px;
            line-height: 1.8;
            color: #555;
        }


        /* ===============================
   RESPONSIVE
================================*/

            }

            .card-box {

    <!-- Javascript files-->
    <script>

        const swipeBtn = document.getElementById("swipeUp");

        window.addEventListener("scroll", function () {

            if (window.scrollY > 400) {
                swipeBtn.classList.add("show");
            } else {
                swipeBtn.classList.remove("show");
            }

        });

        swipeBtn.addEventListener("click", function () {

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });

        });

    </script>
    <script>

        /* ===============================
           TUITION DATABASE
        ================================*/

        const tuitions = {

            1: {
                name: "Bright Future Academy",
                image: "images/banner-1.jpg",
                category: "SSC & Science",
                rating: "⭐ 4.9 Rating",
                about: "Top rated SSC & Science coaching institute in Kalol."
            },

            2: {
                name: "Kalol Science Classes",
                image: "images/t2.jpg",
                category: "11-12 Science",
                rating: "⭐ 4.8 Rating",
                about: "Best science coaching for Physics, Chemistry and Maths."
            },

            3: {
                name: "Success Commerce Hub",
                image: "images/t3.jpg",
                category: "Commerce Stream",
                rating: "⭐ 4.7 Rating",
                about: "Special coaching for Accounts, Economics and Business."
            }

        };


        /* ===============================
           GET ID FROM URL
        ================================*/

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");


        /* ===============================
           CHECK IF DATA EXISTS
        ================================*/

        if (tuitions[id]) {

            const tuition = tuitions[id];

            document.getElementById("t_name").innerText = tuition.name;
            document.getElementById("t_cat").innerText = tuition.category;
            document.getElementById("t_rating").innerText = tuition.rating;
            document.getElementById("t_about").innerText = tuition.about;
            document.getElementById("t_img").src = tuition.image;

        } else {

            document.querySelector(".container").innerHTML =
                "<h2 style='text-align:center;margin:100px'>❌ Tuition Not Found</h2>";

        }

    </script>
