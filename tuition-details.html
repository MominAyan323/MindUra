    <!-- HERO -->
    <section class="hero">
        <div class="container">
            <div class="row align-items-center">

                <div class="col-md-6">
                    <img id="t_img" src="" class="img-fluid">
                </div>

                <div class="col-md-6">

                    <h2 id="t_name"></h2>
                    <p id="t_cat"></p>
                    <h4 id="t_rating"></h4>

                    <p><strong>Teacher:</strong> <span id="t_teacher"></span></p>
                    <p><strong>Subjects:</strong> <span id="t_subjects"></span></p>
                    <p><strong>Classes:</strong> <span id="t_classes"></span></p>
                    <p><strong>Address:</strong> <span id="t_address"></span></p>

                    <a id="t_contact" class="btn btn-success mt-3" target="_blank">
                        Contact on WhatsApp
                    </a>

                </div>

            </div>
        </div>
    </section>


    <!-- ABOUT -->
    <div class="container">
        <div class="card-box">

            <h4>About Institute</h4>
            <p id="t_about"></p>

        </div>
    </div>



    <script>

        /* TUITION DATABASE */

        const tuitions = {

            1: {
                name: "Vinayak Tuition Classes",
                image: "images/vinayak.jpeg",
                category: "SSC Board & CBSE Board",
                rating: "⭐ 4.1 Rating",
                teacher: "Chirag Sir",
                subjects: "Social-Science, Science, English, Mathematics",
                classes: "Class 6 - 10",
                address: "Vijay chowk opp:- D'mart Near Honda showroom Kalol-383721",
                phone: "917016772182",
                about: "Top rated SSC & Science coaching in Kalol."
            },

            // 2: {
            //     name: "Kalol Science Classes",

            //     about: "Special coaching for Accounts, Economics and Business."
            // }

        };



        /* GET ID FROM URL */

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");



        /* SHOW DATA */

        if (tuitions[id]) {

            const tuition = tuitions[id];

            document.getElementById("t_name").innerText = tuition.name;
            document.getElementById("t_cat").innerText = tuition.category;
            document.getElementById("t_rating").innerText = tuition.rating;
            document.getElementById("t_about").innerText = tuition.about;
            document.getElementById("t_img").src = tuition.image;

            document.getElementById("t_teacher").innerText = tuition.teacher;
            document.getElementById("t_subjects").innerText = tuition.subjects;
            document.getElementById("t_classes").innerText = tuition.classes;
            document.getElementById("t_address").innerText = tuition.address;

            document.getElementById("t_contact").href =
                "https://wa.me/" + tuition.phone + "?text=Hello%20I%20want%20tuition%20information";

        }

        else {

            document.body.innerHTML =
                "<h2 style='text-align:center;margin-top:100px'>❌ Tuition Not Found</h2>";
